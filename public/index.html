<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #0f0f1a;
            color: white;
            min-height: 100vh;
        }
        header {
            background: #1a1a2e;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1 { color: #e94560; font-size: 24px; }
        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-size: 16px;
        }
        nav a:hover { color: #e94560; }
        .hero {
            text-align: center;
            padding: 100px 20px;
        }
        .hero h2 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #e94560;
        }
        .hero p {
            font-size: 18px;
            color: #aaa;
            margin-bottom: 40px;
        }
        .btn {
            background: #e94560;
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            text-decoration: none;
        }
        .btn:hover { background: #c73652; }
        .contact {
            background: #1a1a2e;
            padding: 60px 40px;
            text-align: center;
        }
        .contact h3 { font-size: 32px; margin-bottom: 20px; }
        input, textarea {
            width: 100%;
            max-width: 500px;
            padding: 12px;
            margin: 10px 0;
            background: #0f0f1a;
            border: 1px solid #e94560;
            color: white;
            border-radius: 5px;
            font-size: 16px;
        }
        footer {
            text-align: center;
            padding: 20px;
            color: #aaa;
            background: #1a1a2e;
        }
    </style>
</head>
<body>

    <header>
        <h1>AV Academy</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <div class="hero">
        <h2>Welcome to AV Academy</h2>
        <p>3D Art | Game Design | Digital Marketing | Lucknow, UP</p>
        <a href="#contact" class="btn">Contact Us</a>
    </div>

    <div class="contact" id="contact">
        <h3>Contact Us</h3>
        <input type="text" placeholder="Aapka Naam" id="name" /><br>
        <input type="email" placeholder="Aapka Email" id="email" /><br>
        <textarea rows="5" placeholder="Aapka Message" id="message"></textarea><br>
        <button class="btn" onclick="sendMessage()">Send Message</button>
        <p id="response" style="margin-top:20px; color:#4caf50;"></p>
    </div>

    <footer>
        <p>© 2026 AV Academy | Lucknow, UP | 9675903348</p>
    </footer>

    <script>
        async function sendMessage() {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const message = document.getElementById('message').value;

            const res = await fetch('/contact', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, message })
            });

            const data = await res.json();
            document.getElementById('response').innerText = data.msg;
        }
    </script>

</body>
</html>
