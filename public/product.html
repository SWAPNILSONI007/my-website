<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Product — Navyra Jewellers</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#faf8f5;--bg2:#f2ede6;--text:#1c1814;--text2:#6b5f52;--silver:#8a8a9a;--gold:#c9a84c;--card:#ffffff;--border:#e8e0d5;--nav-bg:rgba(250,248,245,0.96);--shadow:rgba(0,0,0,0.06);}
[data-theme="dark"]{--bg:#0e0d0c;--bg2:#161412;--text:#f0ebe3;--text2:#a89b8c;--silver:#9a9aaa;--gold:#d4aa5a;--card:#1a1816;--border:#2a2520;--nav-bg:rgba(14,13,12,0.96);--shadow:rgba(0,0,0,0.3);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);transition:background .4s,color .4s;}
nav{position:fixed;top:0;width:100%;z-index:1000;background:var(--nav-bg);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);height:68px;display:flex;align-items:center;padding:0 5%;gap:2rem;}
.logo{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:400;color:var(--text);text-decoration:none;letter-spacing:.05em;flex-shrink:0;}
.logo span{color:var(--silver);font-style:italic;}
.nav-links{display:flex;gap:.25rem;list-style:none;flex:1;justify-content:center;align-items:center;}
.nav-links a{text-decoration:none;color:var(--text2);font-size:.78rem;letter-spacing:.1em;text-transform:uppercase;padding:.4rem .9rem;display:block;transition:color .3s;white-space:nowrap;}
.nav-links a:hover{color:var(--text);}
.dropdown{position:relative;}
.dropdown-menu{position:absolute;top:100%;left:0;background:var(--card);border:1px solid var(--border);min-width:190px;opacity:0;pointer-events:none;transform:translateY(-6px);transition:all .25s;z-index:100;box-shadow:0 8px 30px var(--shadow);}
.dropdown:hover .dropdown-menu{opacity:1;pointer-events:all;transform:translateY(0);}
.dropdown-menu a{display:block;padding:.7rem 1.25rem;font-size:.75rem;letter-spacing:.08em;text-transform:uppercase;color:var(--text2);text-decoration:none;border-bottom:1px solid var(--border);transition:all .2s;}
.dropdown-menu a:last-child{border-bottom:none;}
.dropdown-menu a:hover{color:var(--text);background:var(--bg2);padding-left:1.6rem;}
.coming-soon-tag{font-size:.55rem;background:var(--border);color:var(--text2);padding:2px 5px;border-radius:2px;margin-left:5px;}
.nav-right{display:flex;align-items:center;gap:.75rem;flex-shrink:0;}
.theme-toggle{background:none;border:1px solid var(--border);width:36px;height:36px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:all .3s;border-radius:50%;}
.cart-btn{position:relative;background:none;border:none;cursor:pointer;color:var(--text);font-size:1.2rem;padding:4px;}
.cart-badge{position:absolute;top:-4px;right:-6px;background:var(--gold);color:#fff;border-radius:50%;width:16px;height:16px;font-size:.6rem;display:flex;align-items:center;justify-content:center;}
.hamburger{display:none;flex-direction:column;gap:4px;cursor:pointer;background:none;border:none;padding:4px;}
.hamburger span{display:block;width:22px;height:1.5px;background:var(--text);}

.product-section{padding:100px 5% 80px;max-width:1200px;margin:0 auto;}
.breadcrumb{font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text2);margin-bottom:2rem;}
.breadcrumb a{color:var(--text2);text-decoration:none;}
.breadcrumb a:hover{color:var(--text);}
.product-layout{display:grid;grid-template-columns:1fr 1fr;gap:5rem;align-items:start;}

.product-visual{position:sticky;top:90px;}
.main-img{background:var(--bg2);border:1px solid var(--border);aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:10rem;margin-bottom:1rem;}
.thumb-row{display:flex;gap:.75rem;}
.thumb{background:var(--bg2);border:1px solid var(--border);width:70px;height:70px;display:flex;align-items:center;justify-content:center;font-size:2rem;cursor:pointer;transition:border-color .2s;}
.thumb:hover,.thumb.active{border-color:var(--silver);}

.product-info{}
.product-cat{font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:var(--silver);margin-bottom:.5rem;}
.product-name{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,3vw,2.5rem);font-weight:400;line-height:1.2;margin-bottom:1rem;}
.product-price-block{display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border);}
.price-main{font-size:1.6rem;font-weight:500;}
.price-orig{font-size:1rem;color:var(--text2);text-decoration:line-through;}
.price-disc{background:#c0392b;color:#fff;font-size:.7rem;padding:3px 8px;letter-spacing:.08em;}
.product-desc{color:var(--text2);line-height:1.85;font-size:.95rem;margin-bottom:2rem;}
.product-features{margin-bottom:2rem;}
.feature-item{display:flex;align-items:center;gap:.75rem;padding:.6rem 0;border-bottom:1px solid var(--border);font-size:.85rem;color:var(--text2);}
.feature-item:last-child{border-bottom:none;}
.feature-icon{font-size:1.1rem;flex-shrink:0;}

.qty-row{display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;}
.qty-label{font-size:.75rem;letter-spacing:.15em;text-transform:uppercase;color:var(--text2);}
.qty-control{display:flex;align-items:center;border:1px solid var(--border);}
.qty-btn{background:none;border:none;width:36px;height:36px;cursor:pointer;font-size:1.1rem;color:var(--text);display:flex;align-items:center;justify-content:center;transition:background .2s;}
.qty-btn:hover{background:var(--bg2);}
.qty-num{width:44px;text-align:center;font-size:.95rem;border:none;background:none;color:var(--text);font-family:'DM Sans',sans-serif;}

.action-buttons{display:flex;flex-direction:column;gap:.75rem;}
.btn-add-cart{background:var(--text);color:var(--bg);border:none;padding:16px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.82rem;letter-spacing:.12em;text-transform:uppercase;transition:all .3s;width:100%;}
.btn-add-cart:hover{opacity:.85;}
.btn-wa-order{background:#25d366;color:#fff;border:none;padding:16px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.82rem;letter-spacing:.12em;text-transform:uppercase;transition:all .3s;width:100%;text-decoration:none;display:block;text-align:center;}
.btn-wa-order:hover{background:#128c7e;}

/* CART */
.cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:2000;opacity:0;pointer-events:none;transition:opacity .3s;}
.cart-overlay.open{opacity:1;pointer-events:all;}
.cart-sidebar{position:fixed;top:0;right:-440px;width:440px;max-width:100vw;height:100vh;background:var(--card);z-index:2001;transition:right .4s;display:flex;flex-direction:column;border-left:1px solid var(--border);}
.cart-sidebar.open{right:0;}
.cart-head{display:flex;justify-content:space-between;align-items:center;padding:1.5rem;border-bottom:1px solid var(--border);}
.cart-head h3{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:400;}
.cart-close{background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--text);}
.cart-body{flex:1;overflow-y:auto;padding:1rem 1.5rem;}
.cart-empty{text-align:center;padding:3rem;color:var(--text2);}
.cart-empty p{font-family:'Playfair Display',serif;font-size:1.2rem;}
.cart-item{display:flex;gap:1rem;padding:1rem 0;border-bottom:1px solid var(--border);align-items:center;}
.cart-item-emoji{font-size:2.5rem;}
.cart-item-info{flex:1;}
.cart-item-name{font-family:'Playfair Display',serif;font-size:.95rem;}
.cart-item-price{color:var(--silver);font-size:.85rem;margin-top:.2rem;}
.cart-item-remove{background:none;border:none;color:var(--text2);cursor:pointer;}
.cart-foot{padding:1.5rem;border-top:1px solid var(--border);}
.cart-total-row{display:flex;justify-content:space-between;margin-bottom:1rem;}
.cart-total-row span{font-family:'Playfair Display',serif;font-size:1.1rem;}
.cart-total-row strong{color:var(--gold);}
.btn-checkout{width:100%;background:#25d366;color:#fff;border:none;padding:14px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.8rem;letter-spacing:.12em;text-transform:uppercase;}

.wa-float{position:fixed;bottom:28px;right:28px;z-index:999;background:#25d366;color:#fff;width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.5rem;text-decoration:none;box-shadow:0 4px 20px rgba(37,211,102,.35);}
.mobile-menu{display:none;position:fixed;top:68px;left:0;right:0;background:var(--nav-bg);border-bottom:1px solid var(--border);padding:1.5rem 5%;z-index:999;flex-direction:column;gap:1rem;}
.mobile-menu.open{display:flex;}
.mobile-menu a{text-decoration:none;color:var(--text2);font-size:.85rem;letter-spacing:.1em;text-transform:uppercase;padding:.5rem 0;border-bottom:1px solid var(--border);}
@media(max-width:768px){.nav-links{display:none;}.hamburger{display:flex;}.product-layout{grid-template-columns:1fr;gap:2rem;}.product-visual{position:static;}}
</style>
</head>
<body>
<a href="https://wa.me/918004703038" target="_blank" class="wa-float">💬</a>
<div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>
<div class="cart-sidebar" id="cartSidebar">
  <div class="cart-head"><h3>Your Cart</h3><button class="cart-close" onclick="closeCart()">✕</button></div>
  <div class="cart-body" id="cartBody"><div class="cart-empty"><p>Your cart is empty</p></div></div>
  <div class="cart-foot" id="cartFoot" style="display:none">
    <div class="cart-total-row"><span>Total</span><strong id="cartTotal">₹0</strong></div>
    <button class="btn-checkout" onclick="checkoutWA()">💬 Order via WhatsApp</button>
  </div>
</div>

<nav>
  <a href="/" class="logo">Navyra <span>Jewellers</span></a>
  <ul class="nav-links">
    <li class="dropdown"><a href="#">Collections ▾</a>
      <div class="dropdown-menu">
        <a href="/shop?cat=pendant">Pendant</a>
        <a href="/shop?cat=ear-jewellery">Ear Jewellery</a>
        <a href="/shop?cat=rings">Rings</a>
        <a href="/shop?cat=anklets">Anklets</a>
        <a href="/shop?cat=bracelets">Bracelets</a>
        <a href="/shop?cat=necklaces">Necklaces</a>
        <a href="/shop?cat=hair-accessories">Hair Accessories</a>
        <a href="#">Gold <span class="coming-soon-tag">Soon</span></a>
      </div>
    </li>
    <li><a href="/shop">Shop</a></li>
    <li><a href="/flash-sale">Sale ⚡</a></li>
    <li><a href="/about">About</a></li>
    <li><a href="/contact">Contact</a></li>
  </ul>
  <div class="nav-right">
    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>
    <button class="cart-btn" onclick="openCart()">🛒 <span class="cart-badge" id="cartCount">0</span></button>
    <button class="hamburger" onclick="toggleMobile()"><span></span><span></span><span></span></button>
  </div>
</nav>
<div class="mobile-menu" id="mobileMenu">
  <a href="/shop">Shop</a><a href="/flash-sale">Sale ⚡</a><a href="/about">About</a><a href="/contact">Contact</a>
</div>

<section class="product-section">
  <p class="breadcrumb"><a href="/">Home</a> / <a href="/shop">Shop</a> / <span id="breadProduct">Product</span></p>
  <div class="product-layout">
    <div class="product-visual">
      <div class="main-img" id="mainImg">💎</div>
      <div class="thumb-row">
        <div class="thumb active" id="thumb1">💎</div>
        <div class="thumb" id="thumb2">🪙</div>
        <div class="thumb" id="thumb3">✨</div>
      </div>
    </div>
    <div class="product-info" id="productInfo">
      <p style="font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--text2)">Loading product...</p>
    </div>
  </div>
</section>

<script>
const EMOJI={pendant:'🔮','ear-jewellery':'✨',rings:'💍',anklets:'🌿',bracelets:'🪬',necklaces:'📿','hair-accessories':'🌸'};
let cart=[];
let qty=1;
let currentProduct=null;

async function loadProduct(){
  const id=new URLSearchParams(location.search).get('id');
  let p=null;
  try{
    if(id){const r=await fetch(`/api/products/${id}`);p=await r.json();}
  }catch(e){}
  if(!p){
    p={_id:'demo',name:'Silver Moon Pendant',category:'pendant',price:1299,originalPrice:1800,description:'A beautiful handcrafted sterling silver pendant featuring a crescent moon design. Perfect for everyday wear or as a thoughtful gift.',inStock:true,badge:'New'};
  }
  currentProduct=p;
  const emoji=p.emoji||EMOJI[p.category]||'💎';
  document.getElementById('mainImg').textContent=emoji;
  document.getElementById('thumb1').textContent=emoji;
  document.getElementById('breadProduct').textContent=p.name;
  document.title=`${p.name} — Navyra Jewellers`;

  const disc=p.originalPrice?Math.round((1-p.price/p.originalPrice)*100):0;
  document.getElementById('productInfo').innerHTML=`
    <p class="product-cat">${(p.category||'').replace('-',' ')}</p>
    <h1 class="product-name">${p.name}</h1>
    <div class="product-price-block">
      <span class="price-main">₹${p.price.toLocaleString()}</span>
      ${p.originalPrice?`<span class="price-orig">₹${p.originalPrice.toLocaleString()}</span><span class="price-disc">${disc}% OFF</span>`:''}
    </div>
    <p class="product-desc">${p.description||'A beautiful handcrafted piece from our sterling silver collection. Each item is carefully selected for quality and design.'}</p>
    <div class="product-features">
      <div class="feature-item"><span class="feature-icon">🪙</span><span>925 Sterling Silver — Hallmarked & Certified</span></div>
      <div class="feature-item"><span class="feature-icon">📦</span><span>Free delivery above ₹999 — 3 to 5 days</span></div>
      <div class="feature-item"><span class="feature-icon">↩️</span><span>7-day easy returns — no questions asked</span></div>
      <div class="feature-item"><span class="feature-icon">💬</span><span>WhatsApp support — we respond within hours</span></div>
    </div>
    <div class="qty-row">
      <span class="qty-label">Quantity</span>
      <div class="qty-control">
        <button class="qty-btn" onclick="changeQty(-1)">−</button>
        <input type="text" class="qty-num" id="qtyNum" value="1" readonly/>
        <button class="qty-btn" onclick="changeQty(1)">+</button>
      </div>
    </div>
    <div class="action-buttons">
      <button class="btn-add-cart" onclick="addToCartCurrent()">Add to Cart</button>
      <a href="https://wa.me/918004703038?text=Hi! I want to order ${encodeURIComponent(p.name)} for ₹${p.price}" target="_blank" class="btn-wa-order">💬 Order on WhatsApp</a>
    </div>
  `;
}

function changeQty(d){qty=Math.max(1,qty+d);document.getElementById('qtyNum').value=qty;}

function addToCartCurrent(){
  if(!currentProduct)return;
  const emoji=currentProduct.emoji||EMOJI[currentProduct.category]||'💎';
  for(let i=0;i<qty;i++)cart.push({name:currentProduct.name,price:currentProduct.price,emoji,id:currentProduct._id});
  updateCart();openCart();
}

function updateCart(){
  document.getElementById('cartCount').textContent=cart.length;
  const body=document.getElementById('cartBody'),foot=document.getElementById('cartFoot');
  if(!cart.length){body.innerHTML='<div class="cart-empty"><p>Your cart is empty</p></div>';foot.style.display='none';return;}
  body.innerHTML=cart.map((i,idx)=>`<div class="cart-item"><span class="cart-item-emoji">${i.emoji}</span><div class="cart-item-info"><p class="cart-item-name">${i.name}</p><p class="cart-item-price">₹${i.price.toLocaleString()}</p></div><button class="cart-item-remove" onclick="removeFromCart(${idx})">✕</button></div>`).join('');
  document.getElementById('cartTotal').textContent='₹'+cart.reduce((s,i)=>s+i.price,0).toLocaleString();
  foot.style.display='block';
}
function removeFromCart(i){cart.splice(i,1);updateCart();}
function openCart(){document.getElementById('cartOverlay').classList.add('open');document.getElementById('cartSidebar').classList.add('open');}
function closeCart(){document.getElementById('cartOverlay').classList.remove('open');document.getElementById('cartSidebar').classList.remove('open');}
function checkoutWA(){
  const items=cart.map(i=>`• ${i.name} — ₹${i.price.toLocaleString()}`).join('\n');
  const total=cart.reduce((s,i)=>s+i.price,0);
  window.open(`https://wa.me/918004703038?text=${encodeURIComponent(`Hi Navyra!\n\nOrder:\n${items}\nTotal: ₹${total.toLocaleString()}`)}`, '_blank');
}
function toggleTheme(){const h=document.documentElement,btn=document.getElementById('themeBtn');if(h.dataset.theme==='light'){h.dataset.theme='dark';btn.textContent='☀️';}else{h.dataset.theme='light';btn.textContent='🌙';}}
function toggleMobile(){document.getElementById('mobileMenu').classList.toggle('open');}
loadProduct();
</script>
</body>
</html>
